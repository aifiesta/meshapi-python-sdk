# Python SDK — Live Tests

name: Live Tests

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:            # run on PRs to any base (feature-branch stacks included)
  workflow_dispatch:

env:
  # Secrets (set in repo → Settings → Secrets and variables → Actions → Secrets)
  MESHAPI_BASE_URL: ${{ secrets.MESHAPI_BASE_URL }}
  MESHAPI_TOKEN: ${{ secrets.MESHAPI_TOKEN }}
  # Core models — safe non-secret defaults.
  MESHAPI_MODEL: "openai/gpt-4o-mini"
  MESHAPI_EMBEDDINGS_MODEL: "openai/text-embedding-3-small"
  MESHAPI_SECOND_MODEL: "anthropic/claude-haiku-4.5"
  MESHAPI_REALTIME_MODEL: "openai/gpt-realtime-mini"
  MESHAPI_IMAGE_URL: "https://upload.wikimedia.org/wikipedia/commons/3/3f/Fronalpstock_big.jpg"
  # Optional-feature config — set as repo Variables (Settings → … → Variables),
  # NOT secrets. Unset ⇒ the corresponding feature test skips. Set them all and
  # MESHAPI_STRICT_LIVETESTS=1 to force a complete run (skips become failures).
  MESHAPI_IMAGE_GEN_MODEL: ${{ vars.MESHAPI_IMAGE_GEN_MODEL }}
  MESHAPI_VIDEO_GEN_MODEL: ${{ vars.MESHAPI_VIDEO_GEN_MODEL }}
  MESHAPI_AUDIO_OUT_MODEL: ${{ vars.MESHAPI_AUDIO_OUT_MODEL }}
  MESHAPI_INPUT_AUDIO_B64: ${{ vars.MESHAPI_INPUT_AUDIO_B64 }}
  MESHAPI_INPUT_AUDIO_FORMAT: ${{ vars.MESHAPI_INPUT_AUDIO_FORMAT }}
  MESHAPI_IMAGE_EDIT_MODEL: ${{ vars.MESHAPI_IMAGE_EDIT_MODEL }}
  MESHAPI_IMAGE_EDIT_INPUT: ${{ vars.MESHAPI_IMAGE_EDIT_INPUT }}
  MESHAPI_STRICT_LIVETESTS: ${{ vars.MESHAPI_STRICT_LIVETESTS }}

jobs:
  live-test:
    name: Python SDK Live Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SDK source (including tests)
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: livetests
        run: pip install -r requirements.txt

      - name: Run live tests (pytest)
        working-directory: livetests
        run: pytest . -v --tb=short

      - name: Write job summary
        if: always()
        run: |
          echo "## 🐍 Python SDK Live Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | 3.12 |" >> $GITHUB_STEP_SUMMARY
          echo "| Base URL | \`${{ env.MESHAPI_BASE_URL }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Model | \`${{ env.MESHAPI_MODEL }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: Notify Slack
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *Python SDK Live Tests* — ${{ job.status }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run> · ${{ github.head_ref || github.ref_name }}"
            }
