# Keeps SHA-pinned GitHub Actions current (MESH-349). Dependabot bumps the pinned
# commit SHA when the upstream tag moves and updates the trailing `# vX` comment,
# so pinning to a SHA no longer means going stale on security patches.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
